source: batdongsan.com.vn
base_url: https://batdongsan.com.vn

crawl_settings:
  fetch_mode: crawl4ai
  max_pages_per_target: 1
  max_listings_per_target: 10
  request_delay_seconds: 5
  concurrency: 1
  save_images: false
  stop_on_block: true
  max_retries: 1
  retry_delay_seconds: 10
  crawler_version: v0.1
  parser_version: v0.1

targets:
  - business_type: sale
    category: ban-nha-rieng
    category_label: Bán nhà riêng
    property_type_group: house
    city_slug: tp-ha-noi
    city_label: Hà Nội
    location_slug: phuong-cau-giay
    location_path: phuong-cau-giay-tp-ha-noi
    location_label: Cầu Giấy
    location_level: ward_or_area
    priority_group: A
    seed_url: https://batdongsan.com.vn/ban-nha-rieng-phuong-cau-giay-tp-ha-noi

  - business_type: sale
    category: ban-can-ho-chung-cu
